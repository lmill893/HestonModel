  .katex * { color: inherit !important; }

<body style="margin:0;padding:0;background:#060810">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const GOLD  = "#f0c060";
const GREEN = "#4ade80";
const RED   = "#f87171";
const CW = 1600, CH = 700;

// ── Math helpers ──────────────────────────────────────────────────────────────
function erf(x) {
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign = x < 0 ? -1 : 1; x = Math.abs(x);
  const t = 1/(1+p*x);
  const y = 1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-(x*x));
  return sign*y;
}
function normCDF(x) { return 0.5*(1+erf(x/Math.sqrt(2))); }
function blackScholes(S,K,T,r,sigma,type) {
  if (T<=0) return type==="call"?Math.max(S-K,0):Math.max(K-S,0);
  const d1=(Math.log(S/K)+(r+0.5*sigma*sigma)*T)/(sigma*Math.sqrt(T));
  const d2=d1-sigma*Math.sqrt(T);
  if (type==="call") return S*normCDF(d1)-K*Math.exp(-r*T)*normCDF(d2);
  return K*Math.exp(-r*T)*normCDF(-d2)-S*normCDF(-d1);
}
function boxMuller() {
  let u=0,v=0;
  while(u===0) u=Math.random();
  while(v===0) v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

// ── Heston stochastic volatility simulation ───────────────────────────────────
// dS = r·S·dt + √v·S·dW_S
// dv = κ(θ − v)dt + ξ·√v·dW_v       corr(dW_S, dW_v) = ρ
// Full truncation scheme (Lord et al. 2010) keeps v ≥ 0
function runHeston(S,K,T,r,v0,kappa,theta,xi,rho,n,steps,type) {
  const dt=T/steps, sqDt=Math.sqrt(dt);
  const paths=[]; let sumPayoff=0;
  for (let i=0;i<n;i++) {
    let St=S, vt=v0;
    const path=[St];
    for (let j=0;j<steps;j++) {
      const z1=boxMuller(), z2=boxMuller();
      const zS=z1, zV=rho*z1+Math.sqrt(1-rho*rho)*z2;
      const sqV=Math.sqrt(Math.max(vt,0));
      vt=Math.max(vt+kappa*(theta-vt)*dt+xi*sqV*sqDt*zV, 0);
      St=St*Math.exp((r-0.5*Math.max(vt,0))*dt+sqV*sqDt*zS);
      path.push(St);
    }
    paths.push(path);
    sumPayoff += type==="call"?Math.max(St-K,0):Math.max(K-St,0);
  }
  return { price: Math.exp(-r*T)*sumPayoff/n, paths };
}

// ── Canvas: path chart ────────────────────────────────────────────────────────
function drawPaths(canvas, paths, S, K, T, type, marketPrice) {
  if (!canvas||!paths.length) return;
  const ctx=canvas.getContext("2d");
  const W=canvas.width, H=canvas.height;
  const PAD={top:40,right:80,bottom:42,left:62};
  const IW=W-PAD.left-PAD.right, IH=H-PAD.top-PAD.bottom;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle="#07090f"; ctx.fillRect(0,0,W,H);
  ctx.fillStyle="rgba(255,255,255,0.012)"; ctx.fillRect(PAD.left,PAD.top,IW,IH);

  const steps=paths[0].length-1;
  const allP=paths.flat();
  const rawMin=Math.min(...allP), rawMax=Math.max(...allP);
  const pad=(rawMax-rawMin)*0.12;
  const minP=rawMin-pad, maxP=rawMax+pad;
  const toX=i=>PAD.left+(i/steps)*IW;
  const toY=p=>PAD.top+IH-((p-minP)/(maxP-minP))*IH;

  // Percentile bands
  const nPts=steps+1;
  const pct=(arr,q)=>arr[Math.max(0,Math.floor(arr.length*q))];
  const b={p10:[],p25:[],p50:[],p75:[],p90:[]};
  for (let i=0;i<nPts;i++) {
    const vals=paths.map(p=>p[i]).sort((a,b)=>a-b);
    b.p10.push(pct(vals,.10)); b.p25.push(pct(vals,.25));
    b.p50.push(pct(vals,.50)); b.p75.push(pct(vals,.75));
    b.p90.push(pct(vals,.90));
  }
  const traceBand=(upper,lower)=>{
    ctx.beginPath();
    upper.forEach((p,i)=>{const x=toX(i),y=toY(p);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    for(let i=nPts-1;i>=0;i--) ctx.lineTo(toX(i),toY(lower[i]));
    ctx.closePath();
  };
  traceBand(b.p90,b.p10);
  const og=ctx.createLinearGradient(PAD.left,0,PAD.left+IW,0);
  og.addColorStop(0,"rgba(80,120,200,0.0)"); og.addColorStop(.3,"rgba(80,120,200,0.05)"); og.addColorStop(1,"rgba(80,120,200,0.03)");
  ctx.fillStyle=og; ctx.fill();
  traceBand(b.p75,b.p25);
  const ig=ctx.createLinearGradient(PAD.left,0,PAD.left+IW,0);
  ig.addColorStop(0,"rgba(80,140,220,0.0)"); ig.addColorStop(.3,"rgba(80,140,220,0.09)"); ig.addColorStop(1,"rgba(80,140,220,0.06)");
  ctx.fillStyle=ig; ctx.fill();

  // Grid
  ctx.font="10px Arial"; ctx.textAlign="right";
  for(let i=0;i<=5;i++){
    const p=minP+(maxP-minP)*(i/5), y=toY(p);
    ctx.strokeStyle="rgba(255,255,255,0.04)"; ctx.lineWidth=1; ctx.setLineDash([3,5]);
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(W-PAD.right,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="rgba(200,216,232,0.22)"; ctx.fillText("$"+p.toFixed(0),PAD.left-8,y+4);
  }
  [0,.25,.5,.75,1].forEach((t,idx)=>{
    const x=toX(t*steps);
    ctx.strokeStyle="rgba(255,255,255,0.025)"; ctx.lineWidth=1; ctx.setLineDash([2,6]);
    ctx.beginPath(); ctx.moveTo(x,PAD.top); ctx.lineTo(x,H-PAD.bottom); ctx.stroke();
    ctx.setLineDash([]);
    if(idx===0||idx===4){
      ctx.fillStyle="rgba(200,216,232,0.2)"; ctx.textAlign=idx===0?"left":"right"; ctx.font="9px Arial";
      ctx.fillText(idx===0?"today":"expiry",x+(idx===0?3:-3),H-PAD.bottom+16);
    }
  });

  // Individual paths
  const display=paths.slice(0,250);
  const itmPaths=[],otmPaths=[];
  display.forEach(path=>{
    const end=path[path.length-1];
    (type==="call"?end>K:end<K)?itmPaths.push(path):otmPaths.push(path);
  });
  otmPaths.forEach(p=>{
    ctx.strokeStyle="rgba(248,100,100,0.055)"; ctx.lineWidth=0.6;
    ctx.beginPath(); p.forEach((v,i)=>{const x=toX(i),y=toY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}); ctx.stroke();
  });
  itmPaths.forEach(p=>{
    ctx.strokeStyle="rgba(74,222,128,0.065)"; ctx.lineWidth=0.6;
    ctx.beginPath(); p.forEach((v,i)=>{const x=toX(i),y=toY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}); ctx.stroke();
  });

  // Highlight paths
  const pick=(arr,n)=>{const out=[];for(let i=0;i<n&&i<arr.length;i++)out.push(arr[Math.floor((i/n)*arr.length)]);return out;};
  pick(itmPaths,6).forEach(path=>{
    const g=ctx.createLinearGradient(toX(0),0,toX(steps),0);
    g.addColorStop(0,"rgba(74,222,128,0.0)"); g.addColorStop(.4,"rgba(74,222,128,0.22)"); g.addColorStop(1,"rgba(74,222,128,0.5)");
    ctx.strokeStyle=g; ctx.lineWidth=1.1; ctx.shadowColor="rgba(74,222,128,0.2)"; ctx.shadowBlur=6;
    ctx.beginPath(); path.forEach((v,i)=>{const x=toX(i),y=toY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}); ctx.stroke();
    ctx.shadowBlur=0;
  });
  pick(otmPaths,3).forEach(path=>{
    const g=ctx.createLinearGradient(toX(0),0,toX(steps),0);
    g.addColorStop(0,"rgba(248,113,113,0.0)"); g.addColorStop(.5,"rgba(248,113,113,0.18)"); g.addColorStop(1,"rgba(248,113,113,0.35)");
    ctx.strokeStyle=g; ctx.lineWidth=0.9;
    ctx.beginPath(); path.forEach((v,i)=>{const x=toX(i),y=toY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}); ctx.stroke();
  });

  // Median
  ctx.lineWidth=1.5; ctx.setLineDash([4,6]); ctx.strokeStyle="rgba(200,216,232,0.3)";
  ctx.beginPath(); b.p50.forEach((v,i)=>{const x=toX(i),y=toY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}); ctx.stroke();
  ctx.setLineDash([]);

  // Strike line
  const ky=toY(K);
  if(ky>=PAD.top&&ky<=H-PAD.bottom){
    ctx.shadowColor="rgba(240,192,96,0.4)"; ctx.shadowBlur=10;
    ctx.strokeStyle="rgba(240,192,96,0.7)"; ctx.lineWidth=1.2; ctx.setLineDash([6,5]);
    ctx.beginPath(); ctx.moveTo(PAD.left,ky); ctx.lineTo(W-PAD.right,ky); ctx.stroke();
    ctx.setLineDash([]); ctx.shadowBlur=0;
    const pW=62,pH=18,pX=W-PAD.right+5;
    ctx.fillStyle="rgba(240,192,96,0.14)"; ctx.strokeStyle="rgba(240,192,96,0.35)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect?ctx.roundRect(pX,ky-pH/2,pW,pH,4):ctx.rect(pX,ky-pH/2,pW,pH);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle="rgba(240,192,96,0.9)"; ctx.font="bold 10px Arial"; ctx.textAlign="left";
    ctx.fillText("K  $"+K,pX+6,ky+4);
  }

  // Spot line
  const sy=toY(S);
  if(sy>=PAD.top&&sy<=H-PAD.bottom){
    ctx.strokeStyle="rgba(200,216,232,0.2)"; ctx.lineWidth=1; ctx.setLineDash([2,6]);
    ctx.beginPath(); ctx.moveTo(PAD.left,sy); ctx.lineTo(W-PAD.right,sy); ctx.stroke();
    ctx.setLineDash([]);
    const pW=60,pH=17;
    ctx.fillStyle="rgba(200,216,232,0.08)"; ctx.strokeStyle="rgba(200,216,232,0.18)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect?ctx.roundRect(PAD.left-pW-5,sy-pH/2,pW,pH,4):ctx.rect(PAD.left-pW-5,sy-pH/2,pW,pH);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle="rgba(200,216,232,0.55)"; ctx.font="9px Arial"; ctx.textAlign="right";
    ctx.fillText("S₀  $"+S,PAD.left-8,sy+4);
  }

  // Expiry scatter
  const finals=paths.map(p=>p[p.length-1]);
  const ex=toX(steps);
  finals.slice(0,300).forEach(f=>{
    const y=toY(f),itm=type==="call"?f>K:f<K;
    ctx.beginPath(); ctx.arc(ex+3+Math.random()*8,y,1.5,0,Math.PI*2);
    ctx.fillStyle=itm?"rgba(74,222,128,0.55)":"rgba(248,113,113,0.4)"; ctx.fill();
  });

  // P10/P90 bar
  const sf=[...finals].sort((a,b)=>a-b);
  const p10y=toY(sf[Math.floor(sf.length*.10)]);
  const p90y=toY(sf[Math.floor(sf.length*.90)]);
  const p50y=toY(sf[Math.floor(sf.length*.50)]);
  const barX=ex+20;
  ctx.fillStyle="rgba(200,216,232,0.06)"; ctx.fillRect(barX-1,p90y,2,p10y-p90y);
  ctx.fillStyle="rgba(200,216,232,0.65)"; ctx.fillRect(barX-5,p50y-1,10,2);
  ctx.fillStyle="rgba(200,216,232,0.3)";
  ctx.fillRect(barX-4,p90y,8,1); ctx.fillRect(barX-4,p10y,8,1);
  ctx.fillStyle="rgba(200,216,232,0.28)"; ctx.font="9px Arial"; ctx.textAlign="left";
  ctx.fillText("P90  $"+sf[Math.floor(sf.length*.90)].toFixed(0),barX+7,p90y+4);
  ctx.fillText("P10  $"+sf[Math.floor(sf.length*.10)].toFixed(0),barX+7,p10y+4);

  // Title
  ctx.fillStyle="rgba(200,216,232,0.16)"; ctx.font="9px Arial"; ctx.textAlign="left";
  ctx.fillText(paths.length+" SIMULATED PATHS · HESTON MODEL",PAD.left+2,PAD.top-16);
  ctx.textAlign="right";
  ctx.fillText("P25–P75 ▪ P10–P90 bands",W-PAD.right-2,PAD.top-16);
}

// ── Canvas: histogram ─────────────────────────────────────────────────────────
function drawHistogram(canvas, paths, K, type) {
  if (!canvas||!paths.length) return;
  const ctx=canvas.getContext("2d");
  const W=canvas.width, H=130;
  const PAD={left:8,right:56,top:10,bottom:20};
  const IW=W-PAD.left-PAD.right, IH=H-PAD.top-PAD.bottom;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle="#080c12"; ctx.fillRect(0,0,W,H);

  const finals=paths.map(p=>p[p.length-1]);
  const minF=Math.min(...finals),maxF=Math.max(...finals);
  const range=maxF-minF||1;
  const bins=70, counts=new Array(bins).fill(0);
  finals.forEach(f=>{
    const b=Math.min(bins-1,Math.floor(((f-minF)/range)*bins));
    counts[b]++;
  });
  const maxCount=Math.max(...counts);
  const bw=IW/bins;
  const toX=f=>PAD.left+((f-minF)/range)*IW;

  counts.forEach((c,i)=>{
    if(c===0)return;
    const x=PAD.left+i*bw, bH=(c/maxCount)*IH, y=PAD.top+IH-bH;
    const fVal=minF+(i/bins)*range;
    const itm=type==="call"?fVal>K:fVal<K;
    ctx.fillStyle=itm?"rgba(74,222,128,0.45)":"rgba(248,113,113,0.35)";
    ctx.fillRect(x,y,Math.max(bw-0.5,0.5),bH);
  });

  const ky=toX(K);
  if(ky>=PAD.left&&ky<=W-PAD.right){
    ctx.strokeStyle="rgba(240,192,96,0.75)"; ctx.lineWidth=1.2; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(ky,PAD.top); ctx.lineTo(ky,PAD.top+IH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="rgba(240,192,96,0.8)"; ctx.font="bold 8px Arial"; ctx.textAlign="left";
    ctx.fillText("K",ky+3,PAD.top+10);
  }

  ctx.fillStyle="rgba(200,216,232,0.2)"; ctx.font="8px Arial"; ctx.textAlign="left";
  ctx.fillText("$"+minF.toFixed(0),PAD.left,H-4);
  ctx.textAlign="right";
  ctx.fillText("$"+maxF.toFixed(0),W-PAD.right-2,H-4);
}

// ── Formula renderer ──────────────────────────────────────────────────────────
function Formula({tex,note}) {
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.katex){
      try{ katex.render(tex,ref.current,{displayMode:true,throwOnError:false}); }catch(e){}
    }
  },[tex]);
  return (
    <div style={{margin:"16px 0"}}>
      <div ref={ref} style={{background:"rgba(26,39,68,0.06)",border:"1px solid rgba(26,39,68,0.12)",borderRadius:8,padding:"14px 20px",overflowX:"auto"}}/>
      {note&&<div style={{fontSize:12,color:"#555",marginTop:6,fontStyle:"italic",paddingLeft:4}}>{note}</div>}
    </div>
  );
}

// ── Heston explainer diagrams ─────────────────────────────────────────────────
function DiagramHestonPaths() {
  const s=[100], v=[0.04];
  for(let i=0;i<60;i++){
    const zS=Math.sin(i*2.3+1.1)*0.7+Math.cos(i*1.1)*0.4;
    const zV=Math.sin(i*1.7+0.5)*0.6+Math.cos(i*2.1)*0.3;
    const dt=0.01,kappa=2,theta=0.04,xi=0.5,rho=-0.7;
    const vt=v[v.length-1], sv=Math.sqrt(Math.max(vt,0));
    v.push(Math.max(vt+kappa*(theta-vt)*dt+xi*sv*Math.sqrt(dt)*zV,0));
    s.push(s[s.length-1]*Math.exp((0.05-0.5*vt)*dt+sv*Math.sqrt(dt)*zS));
  }
  const sMin=Math.min(...s),sMax=Math.max(...s);
  const vMax=Math.max(...v)*1.3;
  const toSX=i=>40+i*6.8, toSY=p=>130-((p-sMin)/(sMax-sMin))*100;
  const toVX=i=>40+i*6.8, toVY=p=>270-((p-0)/(vMax-0))*80;
  return (
    <svg viewBox="0 0 500 300" style={{width:"100%",background:"#f8f8f8",borderRadius:8,marginBottom:14,border:"1px solid #e0e0e0"}}>
      <text x="250" y="16" fontSize="10" fill="#555" textAnchor="middle" fontWeight="700">PRICE (S) — driven by the variance below</text>
      <line x1="35" y1="20" x2="35" y2="140" stroke="#aaa" strokeWidth="1"/>
      <line x1="35" y1="140" x2="460" y2="140" stroke="#aaa" strokeWidth="1"/>
      <polyline points={s.map((p,i)=>`${toSX(i)},${toSY(p)}`).join(' ')} fill="none" stroke="#1a1a2e" strokeWidth="2"/>
      <circle cx="40" cy={toSY(s[0])} r="4" fill="#f0c060"/>
      <text x="250" y="160" fontSize="10" fill="#555" textAnchor="middle" fontWeight="700">VARIANCE (v) — mean-reverting, random</text>
      <line x1="35" y1="165" x2="35" y2="285" stroke="#aaa" strokeWidth="1"/>
      <line x1="35" y1="285" x2="460" y2="285" stroke="#aaa" strokeWidth="1"/>
      <line x1="35" y1={toVY(0.04)} x2="460" y2={toVY(0.04)} stroke="#f0c060" strokeWidth="1" strokeDasharray="5 3"/>
      <text x="463" y={toVY(0.04)+4} fontSize="9" fill="#7a6010">θ</text>
      <polyline points={v.map((p,i)=>`${toVX(i)},${toVY(p)}`).join(' ')} fill="none" stroke="#e05a9a" strokeWidth="2"/>
      <circle cx="40" cy={toVY(v[0])} r="4" fill="#e05a9a"/>
      <text x="38" y="285" fontSize="8" fill="#888">t=0</text>
      <text x="444" y="285" fontSize="8" fill="#888">t=T</text>
      <text x="13" y="80" fontSize="8" fill="#555" textAnchor="middle" transform="rotate(-90,13,80)">Price</text>
      <text x="13" y="225" fontSize="8" fill="#555" textAnchor="middle" transform="rotate(-90,13,225)">Var</text>
    </svg>
  );
}
function DiagramMeanReversion() {
  const rows=[];
  for(let i=0;i<=80;i++){
    const t=i/80*2, theta=0.04, x=40+i*5.2;
    rows.push({x,y1:150-((theta+(0.12-theta)*Math.exp(-1.5*t))*800),
                  y2:150-((theta+(0.04-theta)*Math.exp(-1.5*t))*800),
                  y3:150-((theta+(0.005-theta)*Math.exp(-1.5*t))*800)});
  }
  const thetaY=150-0.04*800;
  return (
    <svg viewBox="0 0 500 170" style={{width:"100%",background:"#f8f8f8",borderRadius:8,marginBottom:14,border:"1px solid #e0e0e0"}}>
      <line x1="40" y1="20" x2="40" y2="155" stroke="#555" strokeWidth="1.5"/>
      <line x1="35" y1="155" x2="460" y2="155" stroke="#555" strokeWidth="1.5"/>
      <line x1="40" y1={thetaY} x2="460" y2={thetaY} stroke="#f0c060" strokeWidth="1.5" strokeDasharray="6 4"/>
      <text x="463" y={thetaY+4} fontSize="9" fill="#7a6010" fontWeight="700">θ</text>
      <polyline points={rows.map(r=>`${r.x},${r.y1}`).join(' ')} fill="none" stroke="#f87171" strokeWidth="2"/>
      <polyline points={rows.map(r=>`${r.x},${r.y2}`).join(' ')} fill="none" stroke="#888" strokeWidth="1.5" strokeDasharray="4 3"/>
      <polyline points={rows.map(r=>`${r.x},${r.y3}`).join(' ')} fill="none" stroke="#4ade80" strokeWidth="2"/>
      <text x="58" y="36" fontSize="9" fill="#dc2626">v₀ high → pulled down toward θ</text>
      <text x="58" y="140" fontSize="9" fill="#16a34a">v₀ low → pulled up toward θ</text>
      <text x="250" y="12" fontSize="9" fill="#888" textAnchor="middle">All paths revert to the long-run variance θ</text>
      <text x="42" y="18" fontSize="8" fill="#888">v</text>
      <text x="462" y="159" fontSize="9" fill="#888">t</text>
    </svg>
  );
}
function DiagramCorrelation() {
  const neg=[],zero=[],pos=[];
  for(let i=0;i<=60;i++){
    const x=40+i*7, shock=Math.sin(i*0.6)*0.6+Math.sin(i*1.1)*0.3;
    neg.push(`${x},${90-shock*18-(i*0.3)}`);
    zero.push(`${x},${90-shock*18}`);
    pos.push(`${x},${90-shock*18+(i*0.3)}`);
  }
  return (
    <svg viewBox="0 0 500 150" style={{width:"100%",background:"#f8f8f8",borderRadius:8,marginBottom:14,border:"1px solid #e0e0e0"}}>
      <line x1="40" y1="10" x2="40" y2="130" stroke="#bbb" strokeWidth="1"/>
      <polyline points={neg.join(' ')} fill="none" stroke="#f87171" strokeWidth="2"/>
      <polyline points={zero.join(' ')} fill="none" stroke="#aaa" strokeWidth="1.5" strokeDasharray="4 3"/>

// ── URL validator ─────────────────────────────────────────────────────────────
function validateUrl(raw) {
  const u = raw.trim().replace(/\/$/, "");
  if (/https?:\/\/:[^/]/.test(u))
    return {ok:false, msg:"❌ Malformed URL — remove the colon after https://", fixed:u.replace(/^(https?:\/\/):+/, "$1")};
  if (!/^https?:\/\//.test(u))
    return {ok:false, msg:"❌ URL must start with http:// or https://", fixed:"https://"+u};
  if (/\.railway\.app:\d+/.test(u))
    return {ok:false, msg:"❌ Remove the port — Railway handles routing automatically", fixed:u.replace(/:\d+$/, "")};
  return {ok:true, msg:null, fixed:u};
}

// ── Trade signal engine ───────────────────────────────────────────────────────
// Compares model price vs market price, moneyness, vol regime, theta decay,
// and delta to generate a structured buy/sell/pass suggestion with reasoning.
function generateSignal(result, params, yfSelectedOption) {
  if (!result || !result.marketPrice || result.marketPrice <= 0) return null;

  const { price: modelPrice, marketPrice, bs, mean, std, paths } = result;
  const { S, K, T, sigma, type, r } = params;

  const signals = [];
  const reasons = [];
  const warnings = [];

  // ── 1. Model vs Market mispricing ─────────────────────────────────────────
  const edge = modelPrice - marketPrice;          // positive = model thinks option is cheap
  const edgePct = Math.abs(edge) / marketPrice * 100;
  const isCheap  = edge >  marketPrice * 0.04;   // model > market by >4%
  const isExpensive = edge < -marketPrice * 0.04; // model < market by >4%

  if (isCheap) {
    signals.push({dir:"BUY", strength: Math.min(edgePct / 20, 1), reason:"model_cheap"});
    reasons.push(`Model prices this at $${modelPrice.toFixed(2)}, market asks $${marketPrice.toFixed(2)} — you'd be buying ${edgePct.toFixed(1)}% below fair value if the model is right`);
  } else if (isExpensive) {
    signals.push({dir:"SELL", strength: Math.min(edgePct / 20, 1), reason:"model_expensive"});
    reasons.push(`Model prices this at $${modelPrice.toFixed(2)}, market asks $${marketPrice.toFixed(2)} — option appears ${edgePct.toFixed(1)}% overpriced relative to the model`);
  } else {
    reasons.push(`Model price ($${modelPrice.toFixed(2)}) is within 4% of market ($${marketPrice.toFixed(2)}) — no strong mispricing signal`);
  }

  // ── 2. Moneyness ──────────────────────────────────────────────────────────
  const moneyness = S / K;
  const isDeepOTM = type==="call" ? moneyness < 0.88 : moneyness > 1.12;
  const isDeepITM = type==="call" ? moneyness > 1.12 : moneyness < 0.88;
  const isATM = Math.abs(moneyness - 1) < 0.03;

  if (isDeepOTM) warnings.push("Deep OTM — low probability of profit, high leverage. Small position sizes appropriate.");
  if (isDeepITM) warnings.push("Deep ITM — behaves more like the underlying stock. High premium, lower leverage.");

  // ── 3. Time decay pressure ────────────────────────────────────────────────
  const d1 = (Math.log(S/K) + (r + 0.5*sigma*sigma)*T) / (sigma*Math.sqrt(T));
  const phi = Math.exp(-(d1*d1)/2) / Math.sqrt(2*Math.PI);
  const dailyTheta = -S * phi * sigma / (2 * Math.sqrt(T)) / 365;
  const thetaAsPctOfPrice = Math.abs(dailyTheta) / marketPrice * 100;

  if (T < 0.1 && thetaAsPctOfPrice > 1.5) {
    warnings.push(`High theta decay — losing ~${thetaAsPctOfPrice.toFixed(1)}% of value per day. Buyers need a fast move; sellers benefit from time passing.`);
    if (signals.some(s=>s.dir==="BUY")) {
      warnings.push("With this much time decay, buying requires a strong directional conviction — consider selling instead to collect premium.");
    }
  } else if (T < 0.25) {
    warnings.push(`Short-dated option (${(T*365).toFixed(0)} days). Theta decay accelerates as expiry approaches.`);
  }

  // ── 4. Probability of profit ──────────────────────────────────────────────
  const finals = paths.map(p => p[p.length-1]);
  const breakeven = type==="call" ? K + marketPrice : K - marketPrice;
  const profitablePaths = finals.filter(f => type==="call" ? f > breakeven : f < breakeven);
  const pop = profitablePaths.length / finals.length;
  reasons.push(`Probability of profit at expiry: ${(pop*100).toFixed(0)}% (breakeven ${type==="call"?">":"<"} $${breakeven.toFixed(2)})`);

  if (pop < 0.25) warnings.push("Low probability of profit (<25%). This is a high-risk, high-reward lottery ticket.");
  if (pop > 0.65) reasons.push("Relatively high probability of finishing in profit.");

  // ── 5. Vol regime — is IV elevated vs model's long-run vol? ───────────────
  const longRunVol = Math.sqrt(params.theta) * 100;
  const ivPct = sigma * 100;
  const volPremium = ivPct - longRunVol;

  if (volPremium > 8) {
    signals.push({dir:"SELL", strength: Math.min(volPremium / 30, 1), reason:"vol_rich"});
    reasons.push(`IV (${ivPct.toFixed(0)}%) is ${volPremium.toFixed(0)}pp above long-run vol (${longRunVol.toFixed(0)}%) — volatility is elevated, favouring option sellers`);
  } else if (volPremium < -5) {
    signals.push({dir:"BUY", strength: Math.min(Math.abs(volPremium) / 30, 1), reason:"vol_cheap"});
    reasons.push(`IV (${ivPct.toFixed(0)}%) is below long-run vol (${longRunVol.toFixed(0)}%) — volatility appears cheap, favouring buyers`);
  }

  // ── 6. Bid-ask spread quality ──────────────────────────────────────────────
  if (yfSelectedOption) {
    const spread = yfSelectedOption.ask - yfSelectedOption.bid;
    const spreadPct = spread / marketPrice * 100;
    if (spreadPct > 15) warnings.push(`Wide bid-ask spread (${spreadPct.toFixed(0)}% of mid price) — liquidity is poor. You'll likely pay significant slippage to enter or exit.`);
    else if (spreadPct < 4) reasons.push(`Tight bid-ask spread (${spreadPct.toFixed(0)}%) — good liquidity for entry and exit.`);
  }

  // ── Aggregate signal ──────────────────────────────────────────────────────
  const buyStrength  = signals.filter(s=>s.dir==="BUY" ).reduce((a,s)=>a+s.strength, 0);
  const sellStrength = signals.filter(s=>s.dir==="SELL").reduce((a,s)=>a+s.strength, 0);

  let verdict, verdictCol, verdictBg, verdictBorder, verdictIcon;
  const net = buyStrength - sellStrength;

  if      (net >  0.6) { verdict="STRONG BUY";  verdictCol="#4ade80"; verdictBg="rgba(74,222,128,0.08)";  verdictBorder="rgba(74,222,128,0.35)";  verdictIcon="▲▲"; }
  else if (net >  0.2) { verdict="BUY";          verdictCol="#86efac"; verdictBg="rgba(74,222,128,0.06)";  verdictBorder="rgba(74,222,128,0.25)";  verdictIcon="▲";  }
  else if (net < -0.6) { verdict="STRONG SELL";  verdictCol="#f87171"; verdictBg="rgba(248,113,113,0.08)"; verdictBorder="rgba(248,113,113,0.35)"; verdictIcon="▼▼"; }
  else if (net < -0.2) { verdict="SELL / WRITE"; verdictCol="#fca5a5"; verdictBg="rgba(248,113,113,0.06)"; verdictBorder="rgba(248,113,113,0.25)"; verdictIcon="▼";  }
  else                 { verdict="NEUTRAL / PASS"; verdictCol=GOLD;    verdictBg="rgba(240,192,96,0.06)";  verdictBorder="rgba(240,192,96,0.25)";  verdictIcon="◆";  }

  return { verdict, verdictCol, verdictBg, verdictBorder, verdictIcon, reasons, warnings, pop, edge, edgePct, net, buyStrength, sellStrength };
}

const PRESETS = {
  "ATM CALL":   {S:100,K:100,T:0.5,r:0.05,sigma:0.20,type:"call",kappa:2.0,theta:0.04,xi:0.3,rho:-0.7,n:1000,steps:100},
  "DEEP OTM":   {S:100,K:130,T:0.25,r:0.05,sigma:0.25,type:"call",kappa:2.0,theta:0.06,xi:0.5,rho:-0.7,n:1000,steps:100},
  "HIGH VOL":   {S:100,K:100,T:1.0,r:0.05,sigma:0.50,type:"call",kappa:1.5,theta:0.25,xi:0.8,rho:-0.5,n:1000,steps:100},
  "PUT HEDGE":  {S:100,K:90,T:0.25,r:0.05,sigma:0.20,type:"put",kappa:3.0,theta:0.04,xi:0.4,rho:-0.8,n:1000,steps:100},
  "LEAP":       {S:100,K:100,T:2.0,r:0.05,sigma:0.20,type:"call",kappa:1.0,theta:0.05,xi:0.3,rho:-0.6,n:1000,steps:200},

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("pricer");
  const [params,setParams]=useState({S:100,K:100,T:0.5,r:0.05,sigma:0.20,type:"call",n:1000,steps:100,kappa:2.0,theta:0.04,xi:0.3,rho:-0.7});
  const [result,setResult]=useState(null);
  const [running,setRunning]=useState(false);
  const pathRef=useRef(null), histRef=useRef(null);

  // yfinance state
  const [yfTicker,setYfTicker]=useState("AAPL");
  const [yfStatus,setYfStatus]=useState("idle");
  const [yfError,setYfError]=useState("");
  const [yfStock,setYfStock]=useState(null);
  const [yfChain,setYfChain]=useState(null);
  const [yfExpiries,setYfExpiries]=useState([]);
  const [yfSelectedExpiry,setYfSelectedExpiry]=useState("");
  const [yfOptType,setYfOptType]=useState("calls");
  const [yfSelectedOption,setYfSelectedOption]=useState(null);
  const [showSetup,setShowSetup]=useState(false);
  const [apiUrl,setApiUrl]=useState("http://localhost:5000");
  const [apiTestMsg,setApiTestMsg]=useState("");
  const API=validateUrl(apiUrl).fixed||apiUrl.replace(/\/$/,"");

  const safeJson=async(res)=>{
    const text=await res.text();
    if(!text||text.trim()==="") throw new Error("Server returned an empty response.");
    try{ return JSON.parse(text); }
    catch(e){
      const snippet=text.replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim().slice(0,200);
      throw new Error(`Server returned non-JSON: "${snippet}"`);
    }
  };

  const testApi=async()=>{
    const {ok,msg,fixed}=validateUrl(apiUrl);
    if(!ok){
      setApiTestMsg(msg);
      if(fixed&&fixed!==apiUrl) setApiUrl(fixed);  // auto-correct the URL
      return;
    }
    setApiTestMsg("testing…");
    try{
      const res=await fetch(`${fixed}/`);
      const text=await res.text();
      // Diagnose specific failure modes
      if(text.includes("GitHub Pages")||text.includes("Page not found")){
        setApiTestMsg("❌ Got a GitHub Pages 404 — your Railway service isn't deployed or the URL is wrong");
        return;
      }
      if(text.trim().startsWith("<")){
        setApiTestMsg("❌ Server returned HTML, not JSON — wrong URL or service not running");
        return;
      }
      const d=JSON.parse(text);
      setApiTestMsg(d.status==="ok"?"✅ Connected!":"⚠ Unexpected response: "+JSON.stringify(d));
    }catch(e){
      if(e.message.includes("fetch")||e.message.includes("NetworkError")){
        setApiTestMsg("❌ Cannot reach server — check the URL and that Railway has deployed");
      } else {
        setApiTestMsg("❌ "+e.message.slice(0,80));
      }
    }
  };

  const fetchStock=async(ticker)=>{
    setYfStatus("loading"); setYfError(""); setYfChain(null); setYfSelectedOption(null);
    try{
      const [sRes,vRes]=await Promise.all([fetch(`${API}/api/stock?ticker=${ticker}`),fetch(`${API}/api/volatility?ticker=${ticker}`)]);
      const sd=await safeJson(sRes), vd=await safeJson(vRes);
      if(sd.error) throw new Error(sd.error);
      setYfStock({...sd,annualVol:vd.annualVol||sd.sigma});
      setYfStatus("ok");
      return {...sd,annualVol:vd.annualVol};
    }catch(e){
      const msg=e.message;
      setYfError(msg.includes("fetch")||msg.includes("NetworkError")||msg.includes("CORS")?"Cannot reach server. Check the API URL and that server.py is running.":msg);
      setYfStatus("error"); return null;
    }
  };

  const fetchChain=async(ticker,expiry,type)=>{
    setYfStatus("loading"); setYfChain(null); setYfSelectedOption(null);
    try{
      const url=`${API}/api/options?ticker=${ticker}&type=${type}${expiry?`&expiry=${expiry}`:""}`;
      const res=await fetch(url), data=await safeJson(res);
      if(data.error) throw new Error(data.error);
      setYfChain(data); setYfExpiries(data.expiries||[]); setYfSelectedExpiry(data.expiry); setYfStatus("ok");
    }catch(e){
      const msg=e.message;
      setYfError(msg.includes("fetch")||msg.includes("NetworkError")?"Cannot reach server.":msg);
      setYfStatus("error");
    }
  };

  const [calibration,setCalibration]=useState(null);

  // Derive Heston parameter suggestions from market data
  const calibrateFromMarket=(stock, chain, opt)=>{
    const histVol = stock.annualVol || 0.20;
    const iv = opt.impliedVol > 0.01 ? opt.impliedVol : histVol;

    // θ: long-run variance = historical vol squared (where vol mean-reverts to)
    const theta = parseFloat((histVol * histVol).toFixed(6));

    // κ: mean reversion speed — faster for indices, slower for single stocks
    // Proxy: if IV >> histVol, vol is elevated → faster reversion expected
    const volRatio = iv / histVol;
    const kappa = parseFloat(Math.min(Math.max(volRatio * 2.0, 1.0), 6.0).toFixed(1));

    // ξ: vol of vol — derived from IV skew across the chain
    // Compare OTM put IV vs ATM IV: steeper skew → higher ξ
    let xi = 0.35; // default
    if (chain && chain.options && chain.options.length > 3) {
      const S = stock.price;
      const opts = chain.options.filter(o => o.impliedVol > 0.01);
      const atm = opts.reduce((best,o) => Math.abs(o.strike-S) < Math.abs(best.strike-S) ? o : best, opts[0]);
      const otmPuts = opts.filter(o => o.strike < S * 0.92 && o.impliedVol > 0.01);
      if (otmPuts.length > 0 && atm) {
        const avgOtmIv = otmPuts.reduce((s,o)=>s+o.impliedVol,0)/otmPuts.length;
        const skew = avgOtmIv - atm.impliedVol;
        xi = parseFloat(Math.min(Math.max(0.15 + skew * 2.5, 0.15), 1.2).toFixed(2));
      }
    }

    // ρ: correlation — negative for equities, more negative with steeper skew
    // Typical equity range −0.4 to −0.8
    let rho = -0.65; // equity default
    if (chain && chain.options && chain.options.length > 3) {
      const S = stock.price;
      const opts = chain.options.filter(o => o.impliedVol > 0.01);
      const atm = opts.reduce((best,o) => Math.abs(o.strike-S) < Math.abs(best.strike-S) ? o : best, opts[0]);
      const otmPuts  = opts.filter(o => o.strike < S * 0.93);
      const otmCalls = opts.filter(o => o.strike > S * 1.07);
      if (otmPuts.length && otmCalls.length && atm) {
        const putSkew  = otmPuts.reduce((s,o)=>s+o.impliedVol,0)/otmPuts.length  - atm.impliedVol;
        const callSkew = otmCalls.reduce((s,o)=>s+o.impliedVol,0)/otmCalls.length - atm.impliedVol;
        const asymmetry = putSkew - callSkew; // positive = put skew dominates
        rho = parseFloat(Math.min(Math.max(-0.4 - asymmetry * 3, -0.95), -0.1).toFixed(2));
      }
    }

    return {
      kappa, theta, xi, rho,
      sigma: parseFloat(iv.toFixed(4)),
      rationale: {
        theta: `√θ = ${(Math.sqrt(theta)*100).toFixed(1)}% matches 1Y historical vol`,
        kappa: `κ = ${kappa} — ${kappa>=4?"fast reversion (IV well above hist vol)":kappa>=2?"moderate reversion":"slow reversion (IV near hist vol)"}`,
        xi:    `ξ = ${xi} — derived from ${chain?.type==="puts"||yfOptType==="puts"?"put":"IV"} skew steepness`,
        rho:   `ρ = ${rho} — ${rho<-0.7?"strong negative skew (crash protection priced in)":rho<-0.5?"moderate equity skew":"mild skew"}`,
      }
    };
  };

  const importOption=(opt)=>{
    if(!yfStock||!yfChain) return;
    const now=new Date(), exp=new Date(yfChain.expiry);
    const T=Math.max(0.01,(exp-now)/(365.25*24*3600*1000));
    const sigma=opt.impliedVol>0.01?opt.impliedVol:(yfStock.annualVol||0.25);
    const cal = calibrateFromMarket(yfStock, yfChain, opt);
    setCalibration({...cal, applied:false});
    setParams(p=>({...p,
      S:yfStock.price, K:opt.strike,
      T:parseFloat(T.toFixed(3)),
      sigma:parseFloat(sigma.toFixed(4)),
      type:yfOptType==="calls"?"call":"put",
      // auto-apply calibrated Heston params
      kappa:cal.kappa, theta:cal.theta, xi:cal.xi, rho:cal.rho,
    }));
    setYfSelectedOption(opt); setTab("pricer"); setTimeout(run,80);
  };

  const set=(k,v)=>setParams(p=>({...p,[k]:v}));

  const run=useCallback(()=>{
    setRunning(true);
    setTimeout(()=>{
      const {S,K,T,r,sigma,n,steps,type,kappa,theta,xi,rho}=params;
      const v0=sigma*sigma;
      const {price,paths}=runHeston(S,K,T,r,v0,kappa,theta,xi,rho,n,steps,type);
      const bs=blackScholes(S,K,T,r,sigma,type);
      const finals=paths.map(p=>p[p.length-1]);
      const sorted=[...finals].sort((a,b)=>a-b);
      const mean=finals.reduce((a,b)=>a+b,0)/finals.length;
      const std=Math.sqrt(finals.reduce((a,b)=>a+(b-mean)**2,0)/finals.length);
      const mp=yfSelectedOption?((yfSelectedOption.bid+yfSelectedOption.ask)/2||yfSelectedOption.lastPrice):null;
      setResult({price,bs,mean,std,paths,marketPrice:mp});
      drawPaths(pathRef.current,paths,S,K,T,type,mp);
      drawHistogram(histRef.current,paths,K,type);
      setRunning(false);
    },20);
  },[params,yfSelectedOption]);

  useEffect(()=>{run();},[]);
  const applyPreset=name=>{const p=PRESETS[name];setParams(prev=>({...prev,...p}));setTimeout(run,50);};
  const err=result?Math.abs(result.price-result.bs):null;

  const sliders=[
    {key:"S",     label:"SPOT PRICE",        min:1,    max:5000, step:1,     fmt:v=>`$${v}`},
    {key:"K",     label:"STRIKE PRICE",       min:1,    max:5000, step:1,     fmt:v=>`$${v}`},
    {key:"T",     label:"TIME TO EXPIRY",     min:0.01, max:10,   step:0.05,  fmt:v=>`${v.toFixed(2)}y`},
    {key:"r",     label:"RISK-FREE RATE",     min:0,    max:0.30, step:0.005, fmt:v=>`${(v*100).toFixed(1)}%`},
    {key:"sigma", label:"INITIAL VOL (σ₀)",  min:0.01, max:3.0,  step:0.01,  fmt:v=>`${(v*100).toFixed(0)}%`},
    {key:"kappa", label:"MEAN REVERSION (κ)", min:0.1,  max:10,   step:0.1,   fmt:v=>v.toFixed(1)},
    {key:"theta", label:"LONG-RUN VOL (θ)",   min:0.01, max:2.0,  step:0.01,  fmt:v=>`${(Math.sqrt(v)*100).toFixed(0)}%`},
    {key:"xi",    label:"VOL OF VOL (ξ)",     min:0,    max:2.0,  step:0.01,  fmt:v=>v.toFixed(2)},
    {key:"rho",   label:"CORRELATION (ρ)",    min:-0.99,max:0.99, step:0.01,  fmt:v=>v.toFixed(2)},
    {key:"n",     label:"SIMULATIONS",        min:100,  max:20000,step:100,   fmt:v=>v.toLocaleString()},
    {key:"steps", label:"TIME STEPS",         min:10,   max:500,  step:10,    fmt:v=>v},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#060810",color:"#c8d8e8",fontFamily:"Arial,sans-serif",display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 20px 40px"}}>
      <style>{`
        *{box-sizing:border-box}
        @keyframes bm-in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes bm-out{from{opacity:1}to{opacity:0}}
        .bm-in{animation:bm-in .22s ease}
        .bm-out{animation:bm-out .22s ease}
        .top-nav{width:100%;max-width:1400px;position:sticky;top:0;z-index:100;margin-bottom:16px}
        .top-nav-bar{background:#0a0f1a;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
        .top-nav-dropdown{background:#0d1220;border:1px solid rgba(255,255,255,0.08);border-top:none;border-radius:0 0 10px 10px;padding:16px 20px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:bm-in .22s ease}
        .top-tab-btn{background:transparent;border:1px solid rgba(255,255,255,0.07);color:rgba(200,216,232,0.45);font-family:Arial;font-size:10px;font-weight:700;letter-spacing:0.12em;padding:7px 14px;border-radius:5px;cursor:pointer;transition:all .15s;display:flex;align-items:center}
        .top-tab-btn:hover{background:rgba(255,255,255,0.05);color:rgba(200,216,232,0.8);border-color:rgba(255,255,255,0.15)}
        .top-tab-btn.active{background:rgba(240,192,96,0.12);border-color:rgba(240,192,96,0.4);color:#f0c060}
        .top-menu-btn{background:transparent;border:1px solid rgba(255,255,255,0.07);color:rgba(200,216,232,0.4);width:32px;height:32px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
        .top-menu-btn:hover{background:rgba(255,255,255,0.05);color:rgba(200,216,232,0.8)}
        .preset-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(200,216,232,0.5);font-family:Arial;font-size:9px;font-weight:700;letter-spacing:0.1em;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
        .preset-btn:hover{background:rgba(240,192,96,0.1);border-color:rgba(240,192,96,0.35);color:#f0c060}
        .panel{background:#0d1218;border:1px solid rgba(255,255,255,0.06);border-radius:8px}
        .stat-box{background:#0d1218;border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:10px 14px}
        .label{font-size:9px;letter-spacing:0.12em;color:rgba(200,216,232,0.35);margin-bottom:4px}
        .big-num{font-size:22px;font-weight:700;letter-spacing:0.02em;line-height:1}
        .run-btn{background:rgba(240,192,96,0.15);border:1px solid rgba(240,192,96,0.4);color:#f0c060;font-family:Arial;font-size:11px;font-weight:700;letter-spacing:0.12em;padding:10px 20px;border-radius:6px;cursor:pointer;transition:all .15s}
        .run-btn:hover:not(:disabled){background:rgba(240,192,96,0.25)}
        .run-btn:disabled{opacity:0.4;cursor:not-allowed}
        .type-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(200,216,232,0.5);font-family:Arial;font-size:10px;font-weight:700;letter-spacing:0.1em;padding:6px 16px;border-radius:4px;cursor:pointer;transition:all .15s;flex:1}
        .type-btn:hover{background:rgba(255,255,255,0.07)}
        .type-btn.ac{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.5);color:#4ade80}
        .type-btn.ap{background:rgba(248,113,113,0.15);border-color:rgba(248,113,113,0.5);color:#f87171}
        input[type=range]{width:100%;accent-color:#f0c060;height:3px}
        .chain-row{cursor:pointer;transition:background .12s}
        .chain-row:hover{background:rgba(255,255,255,0.05)!important}
        .chain-row.selected{background:rgba(240,192,96,0.08)!important;border-left:2px solid rgba(240,192,96,0.6)}
        .explainer-wrap{width:100%;background:#fff}
        .explainer-inner{width:100%;max-width:800px;margin:0 auto;padding:32px 24px 56px}
        .explainer-section{margin-bottom:44px}
        .explainer-section h2{font-family:Arial;font-weight:700;font-size:22px;letter-spacing:0.05em;color:#1a1a1a;margin:0 0 14px 0;border-bottom:2px solid rgba(0,0,0,0.08);padding-bottom:8px}
        .explainer-section p{font-size:15px;line-height:1.9;color:#2a2a2a;margin:0 0 14px 0}
        .explainer-section strong{color:#111;font-weight:700}
        .note{background:#fffbeb;border-left:3px solid #f0c060;border-radius:0 6px 6px 0;padding:12px 16px;font-size:13px;color:#555;line-height:1.7;margin:14px 0}
      `}</style>

      <HeaderDrawer tab={tab} setTab={setTab}/>

      {/* ── PRICER TAB ── */}
      {tab==="pricer" && (
        <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:1400}}>

          {/* Preset buttons */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {Object.keys(PRESETS).map(name=><button key={name} className="preset-btn" onClick={()=>applyPreset(name)}>{name}</button>)}
            {yfStock&&<div style={{marginLeft:"auto",fontSize:10,color:"rgba(200,216,232,0.3)",letterSpacing:"0.08em"}}>
              {yfStock.name} · <span style={{color:GREEN}}>${yfStock.price}</span> · hist vol <span style={{color:GOLD}}>{(yfStock.annualVol*100).toFixed(1)}%</span>
            </div>}
          </div>

          {/* Calibration banner — shown after importing a real option */}
          {calibration&&(
            <div style={{background:"rgba(96,165,250,0.06)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:8,padding:"14px 18px",animation:"bm-in .22s ease"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                <div>
                  <span style={{fontSize:11,fontWeight:700,color:"#60a5fa",letterSpacing:"0.1em"}}>⚙ HESTON CALIBRATION</span>
                  <span style={{fontSize:10,color:"rgba(200,216,232,0.35)",marginLeft:10}}>Parameters estimated from market data · applied automatically on import</span>
                </div>
                <button onClick={()=>setCalibration(null)} style={{background:"none",border:"none",color:"rgba(200,216,232,0.25)",cursor:"pointer",fontSize:14}}>×</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
                {[
                  {key:"kappa", label:"κ  Mean Reversion",  val:calibration.kappa, fmt:v=>v.toFixed(1),   note:calibration.rationale.kappa},
                  {key:"theta", label:"θ  Long-Run Var",    val:calibration.theta, fmt:v=>`√θ = ${(Math.sqrt(v)*100).toFixed(1)}%`, note:calibration.rationale.theta},
                  {key:"xi",    label:"ξ  Vol of Vol",      val:calibration.xi,    fmt:v=>v.toFixed(2),   note:calibration.rationale.xi},
                  {key:"rho",   label:"ρ  Correlation",     val:calibration.rho,   fmt:v=>v.toFixed(2),   note:calibration.rationale.rho},
                ].map(({key,label,val,fmt,note})=>{
                  const current=params[key];
                  const same=Math.abs(current-val)<0.001;
                  return (
                    <div key={key} style={{background:"rgba(0,0,0,0.2)",borderRadius:6,padding:"10px 12px",border:`1px solid ${same?"rgba(74,222,128,0.2)":"rgba(96,165,250,0.15)"}`}}>
                      <div style={{fontSize:9,letterSpacing:"0.1em",color:"rgba(200,216,232,0.35)",marginBottom:4}}>{label}</div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <span style={{fontSize:18,fontWeight:700,color:"#60a5fa"}}>{fmt(val)}</span>
                        {!same&&<span style={{fontSize:10,color:"rgba(200,216,232,0.35)"}}>current: {fmt(current)}</span>}
                        {same&&<span style={{fontSize:10,color:GREEN}}>✓ applied</span>}
                      </div>
                      <div style={{fontSize:10,color:"rgba(200,216,232,0.4)",lineHeight:1.5,marginBottom:same?0:8}}>{note}</div>
                      {!same&&<button onClick={()=>{set(key,val);setTimeout(run,30);}}
                        style={{background:"rgba(96,165,250,0.12)",border:"1px solid rgba(96,165,250,0.3)",color:"#60a5fa",borderRadius:4,padding:"3px 10px",cursor:"pointer",fontSize:10,fontWeight:700,letterSpacing:"0.08em"}}>
                        APPLY
                      </button>}
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <button onClick={()=>{
                  setParams(p=>({...p,kappa:calibration.kappa,theta:calibration.theta,xi:calibration.xi,rho:calibration.rho}));
                  setTimeout(run,30);

          {/* Greeks */}
          {result && (()=>{
            const {S,K,T,r,sigma}=params;
            if(T<=0) return null;
            const d1=(Math.log(S/K)+(r+0.5*sigma*sigma)*T)/(sigma*Math.sqrt(T));
            const d2=d1-sigma*Math.sqrt(T);
            const nd1=normCDF(d1);
            const phi=Math.exp(-(d1*d1)/2)/Math.sqrt(2*Math.PI);
            const delta=params.type==="call"?nd1:nd1-1;
            const gamma=phi/(S*sigma*Math.sqrt(T));
            const vega=S*phi*Math.sqrt(T)/100;
            const theta_g=params.type==="call"
              ?(-S*phi*sigma/(2*Math.sqrt(T))-r*K*Math.exp(-r*T)*normCDF(d2))/365
              :(-S*phi*sigma/(2*Math.sqrt(T))+r*K*Math.exp(-r*T)*normCDF(-d2))/365;
            const rho_g=params.type==="call"?K*T*Math.exp(-r*T)*normCDF(d2)/100:-K*T*Math.exp(-r*T)*normCDF(-d2)/100;
            const greeks=[
              {name:"Δ Delta",val:delta.toFixed(4),desc:"Price change per $1 move in S"},
              {name:"Γ Gamma",val:gamma.toFixed(4),desc:"Delta change per $1 move in S"},
              {name:"ν Vega", val:vega.toFixed(4), desc:"Price change per 1% move in σ"},
              {name:"Θ Theta",val:theta_g.toFixed(4),desc:"Price decay per calendar day"},
              {name:"ρ Rho",  val:rho_g.toFixed(4), desc:"Price change per 1% move in r"},
            ];

                      <div style={{fontSize:10,color:"rgba(200,216,232,0.35)",lineHeight:1.5}}>{g.desc}</div>

              </div>
            );

        </div>

                  {/* Railway-specific hint */}

          <div className="explainer-section">
            <h2>01 · Why Constant Volatility is a Lie</h2>
            <p>Black-Scholes prices options by assuming volatility is a fixed constant — the same number today, tomorrow, and in a year. But anyone who has watched markets knows this isn't true. Volatility <em>spikes</em> during crises, <em>clusters</em> in regimes, and slowly <em>drifts</em> back toward calmer levels.</p>
            <p>The evidence is visible in the options market itself. If Black-Scholes were correct, then all options on the same stock — regardless of their strike price — should imply the same volatility. They don't. Plot the implied volatility of options across strikes and you get a curve, not a flat line. Traders call it the <strong>volatility smile</strong> (or smirk, or skew). Black-Scholes has no explanation for it.</p>
            <DiagramVolSmile/>
            <p>The Heston model (1993) fixes this at the root. Instead of a fixed σ, it lets volatility itself be random — following its own process, correlated with the stock. The result is a model that naturally produces fat tails, skew, and the smile without any tricks.</p>
            <div style={{background:"#fff8e7",border:"1px solid #f0d080",borderRadius:8,padding:"16px",margin:"18px 0"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:"#92400e",marginBottom:8}}>BLACK-SCHOLES ASSUMES</div>
                  {["σ is constant forever","Flat implied vol across all strikes","Stock returns are perfectly normal","No volatility clustering or regimes"].map((t,i)=>(
                    <div key={i} style={{fontSize:13,color:"#dc2626",marginBottom:4}}>✗ {t}</div>
                  ))}
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:"#166534",marginBottom:8}}>HESTON ALLOWS</div>
                  {["σ evolves randomly over time","Curved implied vol surface (smile)","Heavier tails and skewed distribution","Vol spikes, clusters, and mean-reverts"].map((t,i)=>(
                    <div key={i} style={{fontSize:13,color:"#16a34a",marginBottom:4}}>✓ {t}</div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="explainer-section">
            <h2>02 · Two Things Evolving Together</h2>
            <p>The core idea of Heston is simple: instead of one equation describing how a stock moves, you have <em>two equations running simultaneously</em>. The stock price S and its variance v are both random, and they're <strong>connected</strong> — they influence each other at every moment in time.</p>
            <p>Think of it like two people walking, where one person's stumble makes the other more likely to stumble too. The stock and its volatility are like that.</p>
            <Formula tex="dS_t = r S_t \, dt + \sqrt{v_t} \; S_t \; dW_t^S" note="The stock equation: drift (r) plus a random shock scaled by √v — so when variance is high, the stock moves more wildly"/>
            <Formula tex="dv_t = \kappa(\theta - v_t)\,dt + \xi\sqrt{v_t}\,dW_t^v" note="The variance equation: it gets pulled back toward θ (mean reversion), but also gets its own random pushes"/>
            <Formula tex="\operatorname{corr}(dW^S,\, dW^v) = \rho" note="The crucial link: the two random processes share a correlation ρ. This is what creates skew in the distribution"/>
            <DiagramHestonPaths/>
            <div className="note">Notice how the two panels are linked: when the variance (pink, bottom) spikes up, the price (black, top) starts moving more dramatically in that same period. This is the coupling in action.</div>
          </div>

          <div className="explainer-section">
            <h2>03 · Variance is Pulled Back to Earth (κ and θ)</h2>
            <p>Stock prices can drift in any direction indefinitely — there's no force pulling them back. But volatility doesn't work that way. It spikes and then it calms. It has a <em>home</em>.</p>
            <p>In Heston, the variance process has a built-in gravitational pull toward a long-run level θ (theta). The strength of that pull is controlled by κ (kappa). This property is called <strong>mean reversion</strong>.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"18px 0"}}>
              <div style={{background:"#fff8e7",border:"1px solid #f0d080",borderRadius:8,padding:"16px"}}>
                <div style={{background:"#92400e",color:"#fff",borderRadius:4,padding:"3px 10px",fontSize:12,fontWeight:700,display:"inline-block",marginBottom:8}}>κ (kappa) — Speed of pull</div>
                <p style={{fontSize:13,margin:0}}>How quickly variance snaps back toward θ. A high κ means any spike is short-lived — variance gets yanked back fast. A low κ means vol can stay elevated for months. For S&P 500 options, κ is typically calibrated to somewhere between 1 and 3.</p>
              </div>
              <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"16px"}}>
                <div style={{background:"#166534",color:"#fff",borderRadius:4,padding:"3px 10px",fontSize:12,fontWeight:700,display:"inline-block",marginBottom:8}}>θ (theta) — The home level</div>
                <p style={{fontSize:13,margin:0}}>The long-run variance that the process gravitates toward. Shown in the pricer as an equivalent volatility (√θ). For large equity indices, this is often around 15–25% annualised vol. If you leave the model running for a long time, variance will cluster near θ regardless of where it started.</p>
              </div>
            </div>
            <DiagramMeanReversion/>
            <div className="note">Try moving σ₀ (initial vol) far from √θ in the pricer. The paths will start with very different behaviour at the left, but gradually converge toward a similar spread by expiry. That convergence is mean reversion at work.</div>
          </div>

          <div className="explainer-section">
            <h2>04 · How Uncertain is the Uncertainty? (ξ and the Smile)</h2>
            <p>If κ and θ describe where variance goes on average, ξ (xi, "vol of vol") describes how <em>erratically</em> it gets there. A high ξ means variance itself jumps around wildly — it might spike to twice θ, or collapse to near zero, before eventually reverting.</p>
            <Formula tex="\xi \sqrt{v_t} \; dW_t^v" note="The random term in the variance equation — ξ controls the size of the pushes, while √v_t ensures they scale appropriately with the current level of variance"/>
            <p>This parameter is the main driver of the volatility smile. When ξ is zero, the model collapses back to Black-Scholes with constant vol. As ξ increases, the distribution of terminal stock prices gets fatter tails — and those fat tails show up as elevated implied vol on deep OTM options.</p>
            <div className="note">Set ξ = 0 in the pricer and watch what happens to the HESTON vs BS gap — it should collapse toward zero because you've turned off stochastic volatility entirely. Then slowly raise ξ and watch the divergence grow as the model generates increasingly non-normal distributions.</div>
          </div>

          <div className="explainer-section">
            <h2>05 · The Correlation That Creates Skew (ρ)</h2>
            <p>Of all the Heston parameters, ρ (rho — not to be confused with the Greek) is the most important for reproducing what real equity markets look like. It controls the <em>correlation between the stock's random moves and variance's random moves</em>.</p>
            <p>For equities, this correlation is almost always <strong>negative</strong> — typically between −0.5 and −0.8. This encodes something traders have observed for decades: when the stock falls hard, volatility tends to spike simultaneously. This is called the <strong>leverage effect</strong>.</p>
            <DiagramCorrelation/>
            <p>Negative ρ has a direct consequence for option pricing. It makes the left tail of the stock's distribution heavier than the right — the stock can crash faster than it can rally. OTM put options, which pay off in a crash, become more valuable. This is exactly the skew traders pay for when buying downside protection.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,margin:"18px 0"}}>
              {[
                {lbl:"ρ = −0.7",who:"Typical equity index",desc:"Negative skew. Left tail is fat. OTM puts are expensive relative to BS."},
                {lbl:"ρ = 0",who:"Symmetric model",desc:"No skew — just a smile from ξ. Both tails are equally fat."},
                {lbl:"ρ = +0.7",who:"Some commodities & crypto",desc:"Positive skew. Right tail is fat. OTM calls carry the premium."}
              ].map(({lbl,who,desc},i)=>(
                <div key={i} style={{background:"#fff8e7",border:"1px solid #e8d080",borderRadius:8,padding:"14px"}}>

                </div>
              ))}

          </div>

          <div className="explainer-section">
            <h2>06 · Running the Simulation</h2>
            <p>A computer can't work with infinitely small time slices, so we chop the life of the option into many discrete steps. At each step, we generate two random numbers, connect them via ρ, and update both S and v simultaneously.</p>
            <Formula tex="v_{t+\Delta t} = \max\!\bigl(v_t + \kappa(\theta - v_t)\Delta t + \xi\sqrt{v_t}\,\sqrt{\Delta t}\;Z_v,\; 0\bigr)" note="Update variance — then clamp to zero if it goes negative. This 'full truncation' prevents the square root from breaking."/>
            <Formula tex="S_{t+\Delta t} = S_t \cdot \exp\!\left[\left(r - \tfrac{1}{2}v_t\right)\Delta t + \sqrt{v_t \cdot \Delta t}\;Z_S\right]" note="Update stock price using the exponential (log-Euler) scheme — ensures S stays positive"/>
            <Formula tex="Z_S = Z_1, \qquad Z_v = \rho\, Z_1 + \sqrt{1-\rho^2}\; Z_2" note="Z₁ and Z₂ are independent standard normals — this construction (Cholesky) gives them exactly the desired correlation ρ"/>
            <p>Repeat this for every time step, for every simulation path, and you end up with thousands of possible futures. Average the payoffs across all of them and discount back to today — that's the Heston option price.</p>
            <div className="note">The clamping (max(v, 0)) is called the <strong>full truncation scheme</strong>. It's a pragmatic fix: the continuous Heston process can theoretically never go negative, but the discrete approximation can. Clamping keeps everything stable and is standard practice in the industry.</div>
          </div>

          <div className="explainer-section">
            <h2>07 · The Feller Condition</h2>
            <p>There's a mathematical condition that tells you whether the continuous Heston variance process will ever touch zero. It involves all three variance parameters:</p>
            <DiagramFeller/>
            <p>When 2κθ ≥ ξ², the process is "well-behaved" — variance is always pushed away from zero before it can hit it. When this is violated, zero is reachable. In the discrete simulation we handle this with truncation regardless, but violating Feller noticeably affects the behaviour of paths.</p>
            <div className="note">Try it: set κ = 0.5, θ = 0.02, ξ = 1.5 (violating Feller badly). You'll see paths periodically lock into straight lines — that's variance stuck at zero, meaning no randomness in the stock for those steps. This is unphysical and a sign the calibration is poor.</div>
          </div>

            <div style={{background:"#fff8e7",border:"1px solid #f0d080",borderRadius:8,padding:"16px",margin:"18px 0"}}>

            <p>The ultimate test: set ξ = 0 in the pricer. With no vol-of-vol, Heston's variance is deterministic and the model collapses to GBM. The HESTON vs BS number should approach zero — only sampling noise remains. This is a good sanity check that the simulation is working correctly.</p>

          <div className="explainer-section">
            <h2>09 · Glossary — Every Term Explained From Scratch</h2>
            <p>You don't need any prior knowledge of finance or mathematics to read this section. Every term used anywhere in this tool is defined below, with a plain one-line version first, followed by a fuller explanation with real examples.</p>

            {[
              {term:"Stock",simple:"A small slice of ownership in a company.",full:"If a company is worth £1 billion and has issued 1 billion shares, each share is worth £1 and represents one-billionth of the company. When you own a share, you own a tiny piece of the business. If the company does well, the share price rises. If it struggles, the price falls. You make money by selling your shares for more than you paid, or by receiving dividends — a share of profits paid out to shareholders periodically."},
              {term:"Option",simple:"A contract giving you the right — but never the obligation — to buy or sell something at a fixed price before a set date.",full:"Think of it like a reservation deposit at a hotel. You pay a small fee now to lock in a room at today's price for a future date. When the time comes, you can use it if you want — or walk away and lose only the deposit. An option works the same way: you pay a premium upfront for the right to buy or sell a stock at an agreed price. You are never forced to use it. The premium is the most you can ever lose as a buyer."},
              {term:"Call Option",simple:"The right to BUY a stock at a fixed price.",full:"You buy a call when you think the stock is going up. Example: the stock is at $100 today. You buy a call giving you the right to buy it at $110 (the strike) within the next three months. If the stock rises to $150, you can use your right to buy at $110 — a $40 gain, minus the premium you paid. If the stock stays flat or falls, your call expires worthless and you lose only the premium. Your upside is unlimited; your loss is capped."},
              {term:"Put Option",simple:"The right to SELL a stock at a fixed price.",full:"You buy a put when you think the stock is going down, or to protect something you already own — like insurance. Example: you own shares worth $100 each and are worried they might fall. You buy a put giving you the right to sell at $90. If the stock crashes to $50, you can still sell at $90. The premium is the cost of that protection. If the stock rises instead, the put expires worthless — just like paying for insurance you thankfully didn't need."},
              {term:"Premium",simple:"The price you pay to buy an option — your maximum possible loss as a buyer.",full:"Just like an insurance premium. It's the upfront cost of the contract. As a buyer, losing the premium is the worst case — the stock can go to zero and you still only lose what you paid. As a seller (the writer), the premium is the most you can ever gain. The rest of this tool is trying to calculate what the 'correct' premium should be and comparing it to what the market actually charges."},
              {term:"Strike Price (K)",simple:"The fixed price written into the option at which you can buy or sell.",full:"If your call has a strike of $100, you have the right to buy the stock at exactly $100 regardless of where it trades. The stock could be at $300 on expiry — you still pay $100. The strike is set when you buy the option and never changes. It's like fixing the price on your hotel room — whatever inflation does between now and your stay, you pay the agreed rate. In this app, K is the strike price slider."},
              {term:"Spot Price (S)",simple:"What the stock actually costs right now in the market.",full:"This is the live price you'd pay if you went and bought a share this second. It changes constantly throughout the trading day as buyers and sellers agree on trades. In this app, S is the spot price slider. The relationship between S and K is what makes an option valuable or worthless at expiry."},
              {term:"Expiry / Expiration (T)",simple:"The deadline — the date after which the option ceases to exist.",full:"Every option has an expiry date. Once it passes, the option is gone — it either got exercised or expired worthless. T in this app represents time to expiry in years, so T = 0.5 means six months. Longer time to expiry generally makes options more expensive, because there's more time for the stock to make a big move. As expiry approaches, time value bleeds away — this is what theta decay captures."},
              {term:"In the Money (ITM)",simple:"The option has real value right now — it would pay out if exercised immediately.",full:"A call is in the money when the stock price is above the strike — you could buy at the strike and immediately have something worth more. A put is in the money when the stock is below the strike. In the path chart, green paths are those that ended in the money. Being deep in the money means the option behaves almost like owning the stock itself."},
              {term:"Out of the Money (OTM)",simple:"The option is currently worthless if exercised — but might not stay that way.",full:"A call is out of the money when the stock is below the strike. There's no point buying at $100 when you can buy on the open market for $85. But the option still has value if there's time remaining — the stock might move. Red paths in the chart are OTM paths. OTM options are cheap but have a low probability of paying out. They're high-risk, high-reward lottery tickets."},
              {term:"At the Money (ATM)",simple:"The stock price is roughly equal to the strike price.",full:"If the stock is at $100 and the strike is $100, the option is at the money. These options are the most sensitive to changes in volatility and time decay, and are usually the most actively traded. The breakeven is just above the strike for a call (strike + premium) and just below for a put (strike − premium)."},
              {term:"Volatility (σ)",simple:"How wildly and unpredictably the stock moves — its 'jumpiness.'",full:"A stock with 10% annual volatility drifts calmly. A stock with 80% volatility swings dramatically. Volatility is quoted as an annual percentage and measures the typical size of daily price moves. High volatility makes options more expensive — there's a greater chance the stock makes a large move and lands deep in the money. Think of it as the uncertainty level of the stock's future. σ₀ in this app is the starting volatility."},
              {term:"Implied Volatility (IV)",simple:"The market's current expectation of future volatility — reverse-engineered from the option's price.",full:"Rather than measuring past moves, implied volatility works backwards: it asks 'what level of volatility would make this option worth exactly what the market is charging?' If options are expensive, IV is high — the market collectively expects big moves. IV spikes during crises (fear drives up option prices) and falls in calm markets. When IV is much higher than historical volatility, options may be overpriced — the market is pricing in more turbulence than the stock has historically produced."},
              {term:"Historical Volatility",simple:"How much the stock actually moved over the past year — measured from real data.",full:"Calculated by looking at daily price changes over 12 months and computing their standard deviation, then scaling up to an annual figure. It tells you how volatile the stock has been, not how volatile it will be. The server fetches this automatically when you import a stock. If implied volatility (what the market expects) is much higher than historical volatility (what actually happened), options may be overpriced — the signal engine uses this gap."},
              {term:"Theta (Θ) — Time Decay",simple:"The daily value an option loses just from time passing, even if the stock doesn't move.",full:"Options are like milk — they have an expiry date and lose value as that date approaches. Theta measures how much value disappears each day from the clock ticking alone. A theta of −0.05 means the option loses about 5 cents per day from time decay. Critically, this decay accelerates dramatically in the final weeks — it's not a steady drip but an avalanche. Buyers fight theta every day they hold the option. Sellers benefit from it, watching the premium they collected slowly deflate."},
              {term:"Delta (Δ)",simple:"How much the option's price moves when the stock moves by $1.",full:"If a call has a delta of 0.6, then for every $1 the stock rises, the option gains roughly 60 cents. Delta runs from 0 to 1 for calls and −1 to 0 for puts. An ATM option has delta near 0.5 — it moves about 50 cents per $1 of stock movement. A deep ITM option has delta near 1 — it mirrors the stock almost dollar for dollar. Delta also gives a rough approximation of the probability the option finishes in the money."},
              {term:"Gamma (Γ)",simple:"How fast delta itself is changing as the stock moves.",full:"Delta isn't static — it shifts as the stock price changes. Gamma measures how quickly. High gamma means your exposure is changing rapidly, amplifying both gains and losses. ATM options near expiry have very high gamma — they're the most hair-trigger. A small stock move can swing the option dramatically. For sellers, high gamma is dangerous because a position can shift from comfortable to catastrophic quickly."},
              {term:"Vega (ν)",simple:"How much the option's price changes when implied volatility rises or falls by 1%.",full:"If an option has a vega of 0.20 and implied volatility rises by 1 percentage point, the option gains about 20 cents. Vega is always positive for buyers — more volatility means more chance of a big payout, so options become more valuable. The danger for buyers: if you buy an option and volatility subsequently collapses (a 'vol crush'), you can lose money even if the stock moved in the right direction. Sellers benefit from falling volatility."},
              {term:"Rho (ρ — the Greek)",simple:"How much the option's price changes when interest rates move by 1%.",full:"Rho is typically the least important Greek for short-dated options — a small effect. Higher interest rates make calls slightly more valuable and puts slightly less. It matters more for long-dated options (LEAPs). Important note: don't confuse the Greek rho with the Heston parameter also called ρ — they share a symbol but are completely different. The Heston ρ is the correlation between stock moves and volatility moves."},
              {term:"Monte Carlo Simulation",simple:"Running thousands of imaginary futures for the stock and averaging what happens.",full:"Imagine you want to predict the outcome of a complicated game but the rules are too complex for a formula. Instead, you play the game 10,000 times and record what happens. Monte Carlo does this for stock prices: it simulates thousands of possible future paths using random numbers, calculates the option payoff at the end of each path, then averages all those payoffs. That average, discounted back to today, is the option price. More paths = more accurate but slower. The N slider controls how many paths this app simulates."},
              {term:"Black-Scholes Model",simple:"A famous 1973 formula giving an exact option price — under the simplifying assumption that volatility never changes.",full:"Fischer Black and Myron Scholes (with Robert Merton) won a Nobel Prize for this. It was revolutionary because it gave a single, calculable fair price for options. The catch: it assumes volatility is constant forever, which isn't true. It works reasonably well for vanilla options near the money but breaks down for deep OTM options and in stressed markets. Shown in this app as a fast benchmark to compare against the more realistic Heston model."},
              {term:"Heston Model",simple:"An upgrade to Black-Scholes where volatility is allowed to move randomly — matching real-world behaviour much better.",full:"Steven Heston published this model in 1993. The key insight is that volatility itself is uncertain and should be modelled as its own random process. This naturally produces the volatility smile that Black-Scholes cannot explain. Five parameters govern it: σ₀ (starting vol), θ (long-run vol level), κ (speed of reversion back to θ), ξ (how randomly vol itself jumps), and ρ (correlation between stock moves and vol moves). Calibrating these to match real market prices is what professional quants spend much of their time doing."},
              {term:"Mean Reversion",simple:"The pull that drags something back toward its long-run average over time.",full:"Volatility doesn't stay extreme forever. After a market crash, fear eventually subsides and vol calms. After a quiet period, vol eventually picks up again. This gravitational pull back toward a central level is mean reversion. In the Heston model, κ (kappa) controls the strength of this pull. High κ: vol snaps back quickly, spikes are short-lived. Low κ: vol can drift away from its average for months. You can see this in the mean reversion diagram in section 03."},
              {term:"Volatility Smile / Skew",simple:"The pattern where options at different strike prices imply different volatilities — forming a curve rather than a flat line.",full:"If Black-Scholes were perfect, every option on the same stock would imply the same volatility regardless of its strike. In reality, OTM put options consistently imply higher volatility than ATM options — because the market prices in the chance of a sudden crash. Plotted across strikes, this forms a 'skew' or 'smile' shape. The Heston model generates this naturally through its ρ parameter. The volatility smile is the market's way of saying: 'crashes are more likely than a normal distribution would suggest.'"},
              {term:"Bid / Ask / Mid",simple:"The prices buyers and sellers are quoting right now, and the midpoint between them.",full:"The bid is the highest price a buyer is currently willing to pay. The ask is the lowest price a seller will accept. The gap between them is the spread — the profit for market makers who facilitate trades. When you buy an option you pay the ask; when you sell you receive the bid. The mid (bid + ask) ÷ 2 is a fair estimate of true value. A wide spread signals illiquid options — you'll pay significant slippage to get in or out, which erodes any edge the model identifies."},
              {term:"Writing / Selling an Option",simple:"Creating a new option contract and selling it, taking on the obligation the buyer wants to avoid.",full:"When someone buys an option, someone else has to be on the other side. That person is the writer. They receive the premium upfront immediately. In return, they take on the obligation: if the buyer exercises, the writer must deliver. As a writer, the premium is your maximum gain; your loss can be much larger. Writers profit when options expire worthless — they keep the premium and owe nothing. This is why sellers benefit from time decay and falling volatility."},
              {term:"Covered Call",simple:"Selling a call option while already owning the underlying shares — so the risk is limited.",full:"If you own 100 shares and sell a call on those same shares, you're covered. If the buyer exercises and demands the shares, you hand over the ones you own. Your upside is capped at the strike price but you keep the premium no matter what. It's a conservative income strategy: you trade some of your potential gains for a guaranteed premium. Most retail brokers will allow covered calls even for less experienced traders, unlike naked (uncovered) options selling."},
              {term:"Breakeven",simple:"The stock price at which you neither profit nor lose at expiry.",full:"For a call you bought for $5 with a $100 strike, your breakeven is $105. The stock must be above $105 at expiry for you to profit — you need $5 just to cover the premium, then every cent above that is gain. For a put with a $100 strike and $5 premium, breakeven is $95 — the stock needs to fall below $95. The 'probability of profit' in this app simply counts how many simulated paths end beyond the breakeven."},
              {term:"Edge",simple:"The gap between what the model thinks the option is worth and what the market charges.",full:"If the model calculates fair value at $5.00 and the market sells it for $3.50, you have a $1.50 edge as a buyer — you're getting $5 of value for $3.50 (if the model is right). Edge is the theoretical advantage of a trade. Whether the edge is real depends entirely on the quality of the model and its parameters. Professional traders spend enormous effort calibrating models precisely because the edge calculation is only as good as the assumptions behind it."},
              {term:"Risk-Free Rate (r)",simple:"The interest rate you'd earn putting money in the safest possible place — usually government bonds.",full:"If you're tying up cash in an option, you're giving up the ability to earn interest on it elsewhere. The risk-free rate accounts for this opportunity cost. In pricing formulas, future payoffs are discounted back to today using this rate — money in the future is worth slightly less than money now because you could have earned interest on it. In practice, traders use the current short-term government bond yield. For most options this parameter has a relatively small effect compared to volatility."},
              {term:"Probability of Profit (PoP)",simple:"The percentage of simulated paths where you actually made money, after accounting for the premium paid.",full:"This is calculated directly from the simulation — not a formula. After running all the price paths, the app finds your breakeven price (strike ± premium). Then it counts how many of the simulated terminal stock prices ended on the profitable side of that breakeven. If 320 out of 1000 paths ended profitably, PoP = 32%. Because the paths come from the Heston model, they incorporate realistic fat tails and skew — making it a more honest estimate than a simple Black-Scholes calculation would give."},
            ].map(({term,simple,full})=>(
              <div key={term} style={{borderLeft:"3px solid rgba(240,192,96,0.3)",paddingLeft:18,marginBottom:28}}>
                <div style={{fontSize:17,fontWeight:700,color:"#1a1a1a",marginBottom:4}}>{term}</div>
                <div style={{fontSize:14,fontWeight:600,color:"#d97706",marginBottom:8,fontStyle:"italic"}}>"{simple}"</div>
                <p style={{fontSize:14,lineHeight:1.9,color:"#333",margin:0}}>{full}</p>
              </div>
            ))}
          </div>

        </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
